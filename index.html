<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="image">
        <img class="leaves" src="images/halie-west-25xggax4bSA-unsplash.jpg" alt="Image of green leaves">
        <div class="area">
            <img class="logo" src="images/odin-lined.png" alt="The Odin Project logo">
            <div class="odin">ODIN</div>
        </div>
        <div class="credit">Photo by <a class="credit-link" href="https://unsplash.com/pt-br/@haliewestphoto">Hailey West</a> on <a class="credit-link" href="https://unsplash.com/pt-br">Unsplash</a></div>
    </div>
    <div class="container">
        <div class="text">
            <p>This is not real online service! You know you need something like this in your life to help you realize your deepest dreams.</p>
            <p>Sign up <i>now</i> to get started.</p>
            <p>You <i>know</i> you want to.</p>
        </div>
        <form>
            <p class="legend">Let's do this</p>
            <section class="inputs">
                <section class="left">
                    <p class="fill">
                        <label for="first-name">FIRST NAME</label>
                        <input type="text" name="first-name" id="first-name" required />
                    </p>
                    <p class="fill">
                        <label for="mail">EMAIL</label>
                        <input type="email" name="email" id="mail" required />
                    </p>
                    <p class="fill">
                        <label for="pwd">PASSWORD</label>
                        <input type="password" name="password" id="pwd" required minlength="8" />
                    </p>
                </section>
                <section class="right">
                    <p class="fill">
                        <label for="last-name">LAST NAME</label>
                        <input type="text" name="last-name" id="last-name" required />
                    </p>
                    <p class="fill">
                        <label for="phone">PHONE NUMBER</label>
                        <input type="tel" name="phone-number" id="phone" required />
                    </p>
                    <p class="fill">
                        <label for="confirm-pwd">CONFIRM PASSWORD</label>
                        <input type="password" name="password" id="confirm-pwd" required minlength="8" />
                    </p>
                </section>
            </section>
            <button type="submit">Create Account</button>
            <p class="log-in">Already have an account? <a class="log-link" href="#">Log In</a></p>
        </form>
    </div>
</body>
</html>
